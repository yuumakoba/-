<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンバー紹介 - 鳥取大学陸上部</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .profile-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--background);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .profile-info h1 {
      margin-bottom: 0.75rem;
      font-size: 3rem;
      color: var(--text);
    }

    .profile-details {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .detail-label {
      font-weight: 700;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .detail-value {
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.5);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 2rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--primary);
      color: white;
      transform: translateX(-5px);
    }

    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      .profile-container {
        padding: 2rem 1.5rem;
      }
      .profile-info h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <nav class="navbar">
      <a href="index.html" class="brand">
        <i data-lucide="activity" color="var(--primary)" width="28" height="28"></i>
        Tottori T&F
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link"><i data-lucide="home" width="18" height="18"></i> ホーム</a>
        <a href="goals.html" class="nav-link"><i data-lucide="target" width="18" height="18"></i> チーム目標</a>
        <a href="parts.html" class="nav-link"><i data-lucide="info" width="18" height="18"></i> パート紹介</a>
        <a href="members.html" class="nav-link active"><i data-lucide="users" width="18" height="18"></i> メンバー</a>
        <a href="activities.html" class="nav-link"><i data-lucide="activity" width="18" height="18"></i> 活動内容</a>
        <a href="records.html" class="nav-link"><i data-lucide="trophy" width="18" height="18"></i> 歴代記録</a>
        <a href="last_year_records.html" class="nav-link"><i data-lucide="award" width="18" height="18"></i> 去年の記録</a>
      </div>
      <button class="mobile-menu-btn" id="mobile-menu-btn">
        <i data-lucide="menu" width="24" height="24"></i>
      </button>
    </nav>

    <main>
      <div class="container page-enter" style="padding-top: 2rem;">
        <a href="members.html" class="back-btn"><i data-lucide="arrow-left" width="20" height="20"></i> メンバー一覧へ戻る</a>
        
        <div class="profile-container">
          <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">
              <i data-lucide="user" width="80" height="80" id="profile-icon" color="#0ea5e9"></i>
            </div>
            <div class="profile-info">
              <h1 id="profile-name">メンバー名</h1>
              <div class="badge" id="profile-part" style="font-size: 1.1rem; padding: 0.5rem 1.2rem; margin-top: 0.5rem;">パート</div>
            </div>
          </div>
          
          <div class="profile-details">
            <div class="detail-item">
              <span class="detail-label"><i data-lucide="award" width="18" height="18"></i> 記録 (PB)</span>
              <div class="detail-value" id="profile-pb">記録</div>
            </div>
            <div class="detail-item">
              <span class="detail-label"><i data-lucide="school" width="18" height="18"></i> 出身校</span>
              <div class="detail-value" id="profile-highschool">未設定</div>
            </div>
            <div class="detail-item">
              <span class="detail-label"><i data-lucide="book-open" width="18" height="18"></i> 学部学科</span>
              <div class="detail-value" id="profile-department">未設定</div>
            </div>
            <div class="detail-item">
              <span class="detail-label"><i data-lucide="message-circle" width="18" height="18"></i> 一言</span>
              <div class="detail-value" id="profile-quote" style="font-style: italic;">一言メッセージ</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p id="footer-year"></p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('footer-year').innerHTML = `© ${new Date().getFullYear()} Tottori University Track & Field Club. All rights reserved.`;
      
      const params = new URLSearchParams(window.location.search);
      if(params.has('name')) {
        document.getElementById('profile-name').textContent = params.get('name');
        document.getElementById('profile-part').textContent = params.get('part');
        document.getElementById('profile-pb').textContent = params.get('pb');
        document.getElementById('profile-quote').textContent = params.get('quote');
        document.getElementById('profile-highschool').textContent = params.get('highschool');
        document.getElementById('profile-department').textContent = params.get('department') || '未設定';
        
        const color = params.get('color') || '#0ea5e9';
        
        // RGB変換のためのヘルパー (color="rgb(14, 165, 233)" のような文字列を処理)
        document.getElementById('profile-avatar').style.borderColor = color;
        document.getElementById('profile-icon').setAttribute('color', color);
        
        document.getElementById('profile-part').style.backgroundColor = color.replace('rgb', 'rgba').replace(')', ', 0.2)');
        document.getElementById('profile-part').style.color = color;
        
        // もしHEXカラー（#0ea5e9）などが渡された場合は opacity を追加
        if(color.startsWith('#')) {
          document.getElementById('profile-part').style.backgroundColor = color + '33';
        }

        // ページタイトルを更新
        document.title = `${params.get('name')} - メンバー紹介 - 鳥取大学陸上部`;
        
        // 再度アイコンを描画（属性変更後）
        lucide.createIcons();
      }
    });
  </script>
</body>

</html>
