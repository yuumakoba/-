<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳥取大学陸上部 - 歴代記録</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-container">
    <nav class="navbar">
      <a href="index.html" class="brand">
        <i data-lucide="activity" color="var(--primary)" width="28" height="28"></i>
        Tottori T&F
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link"><i data-lucide="home" width="18" height="18"></i> ホーム</a>
        <a href="goals.html" class="nav-link"><i data-lucide="target" width="18" height="18"></i> チーム目標</a>
        <a href="parts.html" class="nav-link"><i data-lucide="info" width="18" height="18"></i> パート紹介</a>
        <a href="members.html" class="nav-link"><i data-lucide="users" width="18" height="18"></i> メンバー</a>
        <a href="activities.html" class="nav-link"><i data-lucide="activity" width="18" height="18"></i> 活動内容</a>
        <a href="records.html" class="nav-link"><i data-lucide="trophy" width="18" height="18"></i> 歴代記録</a>
        <a href="last_year_records.html" class="nav-link"><i data-lucide="award" width="18" height="18"></i> 去年の記録</a>
      </div>
      <button class="mobile-menu-btn" id="mobile-menu-btn">
        <i data-lucide="menu" width="24" height="24"></i>
      </button>
    </nav>

    <main>
      <div class="container page-enter">
        <h1 class="page-title" data-en="RECORDS">歴代記録</h1>

        <div class="card"
          style="margin-bottom: 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <i data-lucide="trophy" color="var(--primary)" width="32" height="32"></i>
            <div>
              <h2 style="font-size: 1.5rem; margin-bottom: 0.2rem;">鳥取大学陸上競技部 歴代記録</h2>
              <p style="color: var(--text-muted);">日々更新される先輩たちの偉大な記録</p>
            </div>
          </div>

          <div class="search-wrapper">
            <i data-lucide="search" class="search-icon" width="20" height="20"></i>
            <input type="text" id="record-search" class="search-input" placeholder="種目、名前、年で検索..." />
          </div>
        </div>

        <div class="card" style="padding: 0; overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>
                  <i data-lucide="medal" width="16" height="16"
                    style="display: inline-block; vertical-align: middle; margin-right: 5px;"></i> 種目
                </th>
                <th>記録</th>
                <th>氏名</th>
                <th>樹立年</th>
              </tr>
            </thead>
            <tbody id="all-time-records-tbody">
              <tr>
                <td colspan="4" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                  データを読み込み中...
                </td>
              </tr>
            </tbody>
          </table>
          <div id="empty-record-msg"
            style="padding: 3rem; text-align: center; color: var(--text-muted); display: none;">
            該当する記録が見つかりませんでした。
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p id="footer-year"></p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('footer-year').innerHTML = `© ${new Date().getFullYear()} Tottori University Track & Field Club. All rights reserved.`;
  </script>
</body>

</html>
